<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4E8F3A">
  <title>SIREP - Acesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-login compact-login">
  <main class="login-compact-shell figma-login-shell">
    <section class="login-hero-lockup" aria-label="Identidade do sistema">
      <div class="login-hero-logo">
        <img src="SIREP.png" alt="Logo SIREP">
      </div>
      <div class="login-hero-copy">
        <h1>SIREP</h1>
      </div>
    </section>

    <p class="login-hero-subtitle">Sistema integrado de rastreamento de equipamentos</p>

    <section class="login-compact-card login-figma-card panel">
      <div class="login-figma-stripe" aria-hidden="true"></div>

      <div class="login-compact-body login-figma-body">
        <form id="loginForm" class="compact-login-form login-figma-form">
          <label class="field login-field" for="usuario">
            <span class="visually-hidden">Usuário</span>
            <div class="input-shell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M20 21a8 8 0 0 0-16 0"></path>
                <circle cx="12" cy="8" r="4"></circle>
              </svg>
              <input id="usuario" name="usuario" type="text" placeholder="Usuário" autocomplete="username">
            </div>
          </label>

          <label class="field login-field" for="senha">
            <span class="visually-hidden">Senha</span>
            <div class="input-shell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="4" y="11" width="16" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
              </svg>
              <input id="senha" name="senha" type="password" placeholder="Senha" autocomplete="current-password">
            </div>
          </label>

          <div class="login-inline-row">
            <a href="#" id="recoverLink" class="text-link">Recuperar senha</a>
          </div>

          <button type="submit" class="btn btn-primary login-submit-btn">Entrar</button>
        </form>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    SirepApp.ensureDemoData();

    const loginForm = document.getElementById("loginForm");
    const recoverLink = document.getElementById("recoverLink");
    const userInput = document.getElementById("usuario");
    const passwordInput = document.getElementById("senha");

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      if (!userInput.value.trim() || !passwordInput.value.trim()) {
        SirepApp.showToast("Preencha usuário e senha para continuar.", "error");
        return;
      }

      SirepApp.showToast("Acesso liberado. Redirecionando para o painel.", "success");
      window.setTimeout(() => {
        window.location.href = "equipamentos.html";
      }, 320);
    });

    recoverLink.addEventListener("click", function (event) {
      event.preventDefault();
      SirepApp.showToast("Recuperação de senha ainda é ilustrativa nesta versão local.", "info");
    });
  </script>
</body>
</html>
