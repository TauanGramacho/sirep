<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIREP - Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url("./background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 476px;
      max-width: 92%;
      background: #FFFFFF;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header-bar {
      height: 24px;
      background: linear-gradient(180deg, #6BA344 0%, #4E8F3A 100%);
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin: 24px auto 16px;
      display: block;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      margin: 0 32px 20px;
      color: #000;
      text-align: center;
    }

    .form-group {
      margin: 0 32px 14px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      width: 20px;
      height: 20px;
      color: #666;
      pointer-events: none;
    }

    input {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      border: 1.5px solid #333;
      padding: 0 12px 0 40px;
      font-size: 15px;
      background: #FFFFFF;
      color: #000;
    }

    input::placeholder {
      color: #666;
    }

    input:focus {
      outline: none;
      border-color: #4E8F3A;
    }

    .link-recuperar {
      display: block;
      text-align: right;
      margin: 8px 32px 20px;
      color: #000;
      text-decoration: none;
      font-size: 14px;
    }

    .link-recuperar:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: calc(100% - 64px);
      height: 52px;
      margin: 0 32px;
      background: linear-gradient(180deg, #7CC242 0%, #4E8F3A 50%, #2F5F2E 100%);
      border: none;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(78, 143, 58, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    hr {
      margin: 24px 32px;
      border: none;
      border-top: 1px solid #333;
    }

    .btn-cadastrar {
      width: calc(100% - 64px);
      height: 48px;
      margin: 0 32px;
      background: transparent;
      border: 1.5px solid #333;
      border-radius: 8px;
      color: #000;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cadastrar:hover {
      background: #f5f5f5;
      border-color: #4E8F3A;
      color: #4E8F3A;
    }

    .footer-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 20px 0 24px;
      font-size: 14px;
      color: #000;
    }

    .lock-icon {
      width: 16px;
      height: 16px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="header-bar"></div>

    <img src="SIREP.png" alt="SIREP" class="logo">

    <h1>SISTEMA INTEGRADO DE RASTREAMENTO DE EQUIPAMENTOS</h1>

    <div class="form-group">
      <div class="input-wrapper">
        <svg class="input-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2"/>
          <path d="M20 22C20 18.134 16.4183 15 12 15C7.58172 15 4 18.134 4 22" stroke="currentColor" stroke-width="2"/>
        </svg>
        <input type="text" placeholder="Usuário">
      </div>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <svg class="input-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M19 11H5C3.89543 11 3 11.8954 3 13V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V13C21 11.8954 20.1046 11 19 11Z" stroke="currentColor" stroke-width="2"/>
          <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="currentColor" stroke-width="2"/>
        </svg>
        <input type="password" placeholder="Senha">
      </div>
    </div>

    <a href="#" class="link-recuperar">Recuperar senha</a>

    <<button class="btn-login" onclick="window.location.href='equipamentos.html'">ENTRAR</button>

    <hr>

    <button class="btn-cadastrar">CADASTRAR NOVO USUÁRIO</button>

    <div class="footer-text">
      <svg class="lock-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <path d="M12 8V12" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
      Acesso restrito
    </div>

  </div>

</body>
</html>
